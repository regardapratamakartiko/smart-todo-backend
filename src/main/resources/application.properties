# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
# Menggunakan port dinamis dari Railway jika ada, jika tidak ada (di localhost) gunakan port 8080
server.port=${PORT:8080}

# ===================================================================
# DATABASE CONFIGURATION (POSTGRESQL ON RAILWAY)
# ===================================================================
# Menggunakan driver PostgreSQL enterprise
spring.datasource.driver-class-name=org.postgresql.Driver

# Menggunakan Public Connection URL dari Railway (Format JDBC)
spring.datasource.url=jdbc:postgresql://junction.proxy.rlwy.net:45037/railway

# Kredensial Otentikasi Pengguna Basis Data
spring.datasource.username=postgres
spring.datasource.password=TfSgWlUclOfdofmZasGvQbyKGeWpYnEw

# ===================================================================
# SPRING DATA JPA & HIBERNATE SETTINGS
# ===================================================================
# Menjaga struktur tabel tetap awet/update di cloud tanpa menghapus data lama
spring.jpa.hibernate.ddl-auto=update

# Dialek SQL khusus untuk optimalisasi performa query PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Menampilkan log eksekusi SQL di terminal backend untuk monitoring (Opsional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# ADDITIONAL ENGINE SETTINGS
# ===================================================================
# Memastikan penanganan tipe data tanggal baru (Java 8 LocalDate) berjalan sinkron
spring.jackson.serialization.write-dates-as-timestamps=false
