<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' style='stop-color:%2300d1ff' /><stop offset='100%25' style='stop-color:%230ea5e9' /></linearGradient></defs><circle cx='20' cy='20' r='18' fill='%230f172a' stroke='url(%23g)' stroke-width='2'/><path d='M12 14 L 28 14 L 20 26 Z' fill='url(%23g)'/><path d='M16 20 L 24 20' stroke='white' stroke-width='2' stroke-linecap='round'/></svg>">
    <title>Smart Todo App - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
        }

        .glow-border {
            border-left: 4px solid #06b6d4;
        }

        .btn-cyan {
            background: #06b6d4;
            color: #0f172a;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-cyan:hover {
            background: #22d3ee;
            transform: translateY(-2px);
        }

        .btn-outline {
            border: 2px solid #ec4899;
            color: #ec4899;
            font-weight: 700;
            padding: 12px 20px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            background: transparent;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: #ec4899;
            color: white;
        }

        .input-field {
            background: #f8fafc;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #1e293b;
            width: 100%;
        }

        .input-field::placeholder {
            color: #cbd5e1;
        }

        .input-field:focus {
            outline: none;
            border: 2px solid #06b6d4;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            color: #0f766e;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

<div class="text-center mb-8">
    <h1 class="logo-text text-white">MANAJEMEN TUGAS</h1>
</div>

<div class="text-center mb-8">
    <h2 class="text-white text-5xl font-bold">TASK OS</h2>
    <p class="text-pink-500 text-xs font-bold mt-2">VERSI 4.0.2</p>
</div>

<div class="bg-white rounded-lg shadow-2xl w-full max-w-md p-8 glow-border">
    <form id="authForm" onsubmit="handleAuth(event)" class="space-y-6">
        <div>
            <label class="block text-sm font-bold text-slate-800 mb-3 uppercase">Username</label>
            <div class="flex items-center">
                <!-- Tambah atribut name untuk Spring Security -->
                <input type="text" id="username" name="username" required placeholder="Masukkan username" class="input-field flex-1">
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-slate-800 mb-3 uppercase">Password</label>
            <div class="flex items-center">
                <!-- Tambah atribut name untuk Spring Security -->
                <input type="password" id="password" name="password" required placeholder="••••••••" class="input-field flex-1">
            </div>
        </div>

        <p class="text-xs text-slate-500 text-center" id="infoText">Silakan masuk untuk melanjutkan</p>

        <button type="submit" id="btnSubmit" class="btn-cyan">
            MASUK
        </button>

        <button type="button" onclick="switchMode()" id="btnSwitch" class="btn-outline">
            DAFTAR AKUN BARU
        </button>
    </form>
</div>

<div class="text-center mt-12">
    <p class="text-slate-400 text-xs mt-4">© 2026 Manajemen Tugas. Hak Cipta Dilindungi.</p>
</div>

<script>
    let isLoginMode = true;

    function switchMode() {
        isLoginMode = !isLoginMode;
        const infoText = document.getElementById('infoText');
        infoText.className = "text-xs text-slate-500 text-center";

        if (isLoginMode) {
            document.getElementById('btnSubmit').innerHTML = 'MASUK';
            document.getElementById('btnSwitch').innerHTML = 'DAFTAR AKUN BARU';
            infoText.innerText = 'Silakan masuk untuk melanjutkan';
        } else {
            document.getElementById('btnSubmit').innerHTML = 'DAFTAR';
            document.getElementById('btnSwitch').innerHTML = 'SUDAH PUNYA AKUN? MASUK';
            infoText.innerText = 'Daftarkan akun baru Anda';
        }
    }

    async function handleAuth(e) {
        e.preventDefault();

        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const endpoint = isLoginMode ? '/api/login' : '/api/register';
        const infoText = document.getElementById('infoText');

        if (u.length === 0 || p.length === 0) {
            infoText.innerText = '⚠️ Harap isi semua kolom';
            infoText.className = "text-xs text-red-600 font-bold text-center";
            return;
        }

        infoText.innerText = '⏳ Memproses...';
        infoText.className = "text-xs text-cyan-600 text-center";

        try {
            let options = {};

            if (isLoginMode) {
                // Format login menggunakan URLSearchParams (Form URL-Encoded) demi Spring Security
                const params = new URLSearchParams();
                params.append('username', u);
                params.append('password', p);

                options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                };
            } else {
                // Format register menggunakan JSON sesuai target AuthController.java
                options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                };
            }

            const res = await fetch(endpoint, options);

            if (res.ok) {
                if (isLoginMode) {
                    infoText.innerText = '✓ Login berhasil!';
                    infoText.className = "text-xs text-emerald-600 font-bold text-center";
                    setTimeout(() => { window.location.href = '/index.html'; }, 1000);
                } else {
                    infoText.innerText = '✓ Pendaftaran berhasil! Silakan masuk.';
                    infoText.className = "text-xs text-emerald-600 font-bold text-center";
                    setTimeout(() => { switchMode(); }, 1500);
                }
            } else {
                let errText = "Terjadi kesalahan.";
                try {
                    errText = await res.text();
                } catch(_) {}

                // Jika error 401 saat login, beri info yang manusiawi
                if (res.status === 401 && isLoginMode) {
                    errText = "Username atau Password Salah / Belum Terdaftar!";
                }

                infoText.innerText = `⚠️ ${errText}`;
                infoText.className = "text-xs text-red-600 font-bold text-center";
            }
        } catch (error) {
            infoText.innerText = '⚠️ Koneksi gagal ke server.';
            infoText.className = "text-xs text-red-600 font-bold text-center";
        }
    }
</script>
</body>
</html>
